<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WatchTube</title>
    <link rel="stylesheet" type="text/css" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <section class="popup-card">
        <div class="popup-head">
          <p class="popup-badge">WatchTube</p>
          <h1 class="popup-title">YouTube Settings</h1>
          <p class="popup-subtitle">
            Saved videos are integrated into the homepage and appear like
            regular YouTube cards.
          </p>
        </div>

        <div class="settings-group">
          <label class="toggle-row" for="showWatchLater">
            <div class="toggle-copy">
              <span class="toggle-label">
                Add Watch Later row
              </span>
              <span id="showWatchLaterState" class="toggle-state">
                Enabled
              </span>
            </div>

            <span class="switch">
              <input id="showWatchLater" type="checkbox" />
              <span class="slider"></span>
            </span>
          </label>

          <label class="toggle-row" for="showSubscriptions">
            <div class="toggle-copy">
              <span class="toggle-label">
                Add Subscription videos row
              </span>
              <span id="showSubscriptionsState" class="toggle-state">
                Enabled
              </span>
            </div>

            <span class="switch">
              <input id="showSubscriptions" type="checkbox" />
              <span class="slider"></span>
            </span>
          </label>

          <label class="toggle-row" for="hideShorts">
            <div class="toggle-copy">
              <span class="toggle-label">Hide Shorts</span>
              <span id="hideShortsState" class="toggle-state"> Disabled </span>
            </div>

            <span class="switch">
              <input id="hideShorts" type="checkbox" />
              <span class="slider"></span>
            </span>
          </label>
        </div>

        <div class="quick-actions" aria-label="Quick actions">
          <button id="openWatchLater" class="primary-action" type="button">
            Open Watch Later
          </button>
          <button id="openSubscriptions" class="primary-action" type="button">
            Open Subscriptions
          </button>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
